# Publishes the same image digest to GHCR and Docker Hub on GitHub Release.
# Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN
# Stable releases (prerelease unchecked): semver tags + latest.
# Prereleases: semver tags + beta (no latest).
name: Create and publish Docker image

on:
  release:
    types: [published]

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    env:
      IMAGE_GHCR: ghcr.io/${{ github.repository }}
      IMAGE_DOCKERHUB: docker.io/${{ secrets.DOCKERHUB_USERNAME }}/playwright-reports-server
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051
        with:
          images: |
            ${{ env.IMAGE_GHCR }}
            ${{ env.IMAGE_DOCKERHUB }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}
            type=raw,value=beta,enable=${{ github.event.release.prerelease }}

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: true
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation (GHCR)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE_GHCR }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
